<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель коллекции</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --surface-color: #ffffff;
            --text-color: #333333;
            --border-color: #dddddd;
            --accent-color: #e50914; 
            --primary-color: #2b2b2b;
            --border-radius: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 40px 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        h1 { margin-bottom: 30px; color: var(--primary-color); }

        .panel {
            background: var(--surface-color);
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        .panel h2 { margin-top: 0; margin-bottom: 20px; border-bottom: 2px solid var(--bg-color); padding-bottom: 10px; }

        /* Форма */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px; font-family: inherit; font-size: 15px;
        }
        .form-group textarea { resize: vertical; min-height: 80px; }
        
        .btn {
            background-color: var(--primary-color); color: white;
            border: none; padding: 12px 20px; font-size: 16px;
            font-weight: 600; border-radius: 4px; cursor: pointer; width: 100%;
        }
        .btn:hover { background-color: #000000; }

        /* Список для удаления */
        .list-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid var(--border-color);
        }
        .list-item:last-child { border-bottom: none; }
        
        .item-info { display: flex; align-items: center; gap: 15px; }
        .item-info img { width: 40px; height: 60px; object-fit: cover; border-radius: 4px; }
        .item-info strong { display: block; font-size: 16px; }
        .item-info span { font-size: 12px; color: #888; background: #eee; padding: 2px 6px; border-radius: 4px;}
        
        .btn-delete {
            background: none; border: 1px solid var(--accent-color);
            color: var(--accent-color); padding: 6px 12px;
            border-radius: 4px; cursor: pointer; transition: 0.2s;
        }
        .btn-delete:hover { background: var(--accent-color); color: white; }
    </style>
</head>
<body>

    <h1>Управление коллекцией</h1>

    <!-- Форма добавления -->
    <div class="panel">
        <h2>Добавить запись</h2>
        <form id="addForm">
            <div class="form-group">
                <label>Тип контента</label>
                   <select id="inputType" required>
        <option value="movies">Фильм</option>
        <option value="series">Сериал</option>
        <option value="cartoons">Мультфильм</option> <!-- Новая категория -->
    </select>
    <input type="text" id="inputTitle" placeholder="Название" required>
    <input type="url" id="inputPoster" placeholder="Ссылка на постер" required>
    <input type="text" id="inputGenres" placeholder="Жанры (через запятую)">
    
    <!-- НОВЫЕ ПОЛЯ -->
    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
        <input type="number" id="inputYear" placeholder="Год выпуска" style="flex: 1;" required>
        <select id="inputRating" style="flex: 1;" required>
            <option value="" disabled selected>Моя оценка</option>
            <option value="5">★★★★★ (5)</option>
            <option value="4">★★★★☆ (4)</option>
            <option value="3">★★★☆☆ (3)</option>
            <option value="2">★★☆☆☆ (2)</option>
            <option value="1">★☆☆☆☆ (1)</option>
        </select>
    </div>
    <!-- КОНЕЦ НОВЫХ ПОЛЕЙ -->
    
    <textarea id="inputDesc" placeholder="Описание"></textarea>
    <textarea id="inputReview" placeholder="Мой отзыв"></textarea>
    <button type="submit">Добавить в базу</button>
        </form>
    </div>

    <!-- Список для удаления -->
    <div class="panel">
        <h2>Редактирование базы</h2>
        <div id="adminList"></div>
    </div>

    <script>
   
const API_URL = 'https://script.google.com/macros/s/AKfycbxdfynb-Smux0tyeX4OWNTZocMniyXvL2GIAfJ8YQJP-LZ5IvdUIjjxUeXfBJn6PY9e/exec'; 

let collections = { movies: [], series: [], cartoons: [] };

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('adminList').innerHTML = '<p>Загрузка базы данных...</p>';
    loadData();
});

async function loadData() {
    try {
        const response = await fetch(API_URL);
        const data = await response.json();
        
        collections.movies = data.filter(item => item.type === 'movies');
        collections.series = data.filter(item => item.type === 'series');
        collections.cartoons = data.filter(item => item.type === 'cartoons');
        
        renderAdminList();
    } catch (error) {
        console.error("Ошибка:", error);
        document.getElementById('adminList').innerHTML = '<p style="color:red;">Ошибка подключения к таблице</p>';
    }
}

// Отправка формы (добавление строки в таблицу)
document.getElementById('addForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = this.querySelector('button[type="submit"]');
    const originalText = btn.textContent;
    btn.textContent = 'Сохранение...';
    btn.disabled = true;

    const newItem = {
        id: Date.now(),
        type: document.getElementById('inputType').value,
        title: document.getElementById('inputTitle').value.trim(),
        poster: document.getElementById('inputPoster').value.trim(),
        genres: document.getElementById('inputGenres').value.trim(),
        description: document.getElementById('inputDesc').value.trim(),
        review: document.getElementById('inputReview').value.trim(),
        year: document.getElementById('inputYear').value, 
        rating: document.getElementById('inputRating').value  
        };

    try {
        await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(newItem)
        });
        
        this.reset();
        await loadData(); // Перезагружаем список
    } catch (error) {
        alert('Ошибка при сохранении!');
    } finally {
        btn.textContent = originalText;
        btn.disabled = false;
    }
});

function renderAdminList() {
    const container = document.getElementById('adminList');
    container.innerHTML = '';

    const allItems = [
    ...collections.movies.map(m => ({ ...m, typeName: 'Фильм' })),
    ...collections.series.map(s => ({ ...s, typeName: 'Сериал' })),
    ...collections.cartoons.map(c => ({ ...c, typeName: 'Мультфильм' })) // Вывод мультфильмов
].sort((a, b) => b.id - a.id);

    if (allItems.length === 0) {
        container.innerHTML = '<p style="color: #888;">База данных пуста.</p>';
        return;
    }

    allItems.forEach(item => {
        const div = document.createElement('div');
        div.className = 'list-item';
        div.innerHTML = `
            <div class="item-info">
                <img src="${item.poster}" onerror="this.src='https://placehold.co/40x60/ccc/fff?text=?'">
                <div>
                    <strong>${item.title}</strong>
                    <span>${item.typeName}</span>
                </div>
            </div>
            <button class="btn-delete" onclick="deleteItem('${item.id}', this)">Удалить</button>
        `;
        container.appendChild(div);
    });
}

// Удаление строки из таблицы
async function deleteItem(id, btnElement) {
    if (confirm('Точно удалить из базы?')) {
        btnElement.textContent = 'Удаление...';
        btnElement.disabled = true;
        
        try {
            await fetch(`${API_URL}?action=delete&id=${id}`);
            await loadData();
        } catch (error) {
            alert('Ошибка удаления!');
            btnElement.textContent = 'Удалить';
            btnElement.disabled = false;
        }
    }
}
    </script>
</body>
</html>
