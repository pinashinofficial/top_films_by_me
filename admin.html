<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель</title>
    <style>
        :root {
            --bg: #0f111a; --surface: rgba(30, 30, 45, 0.7);
            --primary: #e50914; --text: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .glass { background: var(--surface); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 25px; margin-bottom: 30px; }
        h1, h2 { text-align: center; margin-bottom: 20px; }
        form { display: flex; flex-direction: column; gap: 15px; }
        input, select, textarea { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; }
        .row { display: flex; gap: 15px; }
        .row > * { flex: 1; }
        button { padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; color: white; }
        .btn-main { background: var(--primary); }
        .btn-main:hover { background: #ff0f1a; }
        .btn-cancel { background: #555; display: none; }
        .item { display: flex; justify-content: space-between; background: rgba(0,0,0,0.4); padding: 10px; margin-bottom: 10px; border-radius: 8px; }
        .item-info { display: flex; gap: 15px; align-items: center; }
        .item-info img { width: 40px; height: 60px; object-fit: cover; }
        .actions { display: flex; gap: 10px; }
        .actions button { 
            padding: 8px 15px; 
            font-size: 14px; 
            border-radius: 8px; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .btn-edit { background: #4caf50; }
        .btn-del { background: var(--primary); }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ Управление коллекцией</h1>
        <div class="glass">
            <h2 id="formTitle">Добавить запись</h2>
            <form id="adminForm">
                <select id="f_type" required>
                    <option value="movies">Фильм</option><option value="series">Сериал</option><option value="cartoons">Мультфильм</option>
                </select>
                <input type="text" id="f_title" placeholder="Название" required>
                <input type="url" id="f_poster" placeholder="Ссылка на постер" required>
                <div class="row">
                    <input type="number" id="f_year" placeholder="Год" required>
                    <select id="f_rating" required>
                        <option value="" disabled selected>Оценка</option>
                        <option value="5">5 звезд</option><option value="4">4 звезды</option>
                        <option value="3">3 звезды</option><option value="2">2 звезды</option><option value="1">1 звезда</option>
                    </select>
                </div>
                <input type="text" id="f_genres" placeholder="Жанры">
                <div class="row">
                    <input type="number" id="f_topRank" placeholder="Место в ТОП-100 (оставьте пустым если не в топе)">
                    <input type="text" id="f_customLists" placeholder="Списки через запятую (напр: Любимое, Комедии)">
                </div>
                <textarea id="f_desc" placeholder="Описание"></textarea>
                <textarea id="f_review" placeholder="Отзыв"></textarea>
                
                <div class="row">
                    <button type="button" id="btnCancel" class="btn-cancel">Отмена</button>
                    <button type="submit" id="btnSubmit" class="btn-main">Сохранить</button>
                </div>
            </form>
        </div>
        <div class="glass">
            <h2>База данных</h2>
            <div id="listContainer">Загрузка...</div>
        </div>
    </div>

   <!-- Подключаем библиотеку Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // Вставь те же самые URL и Key
        const SUPABASE_URL = 'https://ktacbvcwsyajpeacdmwt.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_KbC2_RFlQ8U5_4kiR3vL4Q_bqAQVHvG';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentData = [];
        let editingItem = null;

        async function load() {
            try {
                const { data, error } = await supabase
                    .from('collection')
                    .select('*')
                    .order('id', { ascending: false }); // Сортируем: новые сверху

                if (error) throw error;
                
                currentData = data || [];
                renderList();
            } catch (error) {
                console.error(error);
                document.getElementById('listContainer').innerHTML = '<p style="color:red;">Ошибка подключения к БД.</p>';
            }
        }

        function renderList() {
            const html = currentData.map(i => `
                <div class="item">
                    <div class="item-info">
                        <img src="${i.poster || ''}">
                        <div>
                            <strong>${i.title}</strong><br>
                            <small>${i.type} | Топ: ${i.topRank || '-'} | Списки: ${i.customLists || '-'}</small>
                        </div>
                    </div>
                    <div class="actions">
                        <button class="btn-edit" onclick="edit('${i.id}')">✏️ Изменить</button>
                        <button class="btn-del" onclick="del('${i.id}')">🗑️ Удалить</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('listContainer').innerHTML = html || 'Пусто';
        }

        document.getElementById('adminForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.innerText = 'Сохранение...'; btn.disabled = true;

            // Собираем данные с формы. Пустые строки для чисел превращаем в null
            const payload = {
                type: document.getElementById('f_type').value,
                title: document.getElementById('f_title').value,
                poster: document.getElementById('f_poster').value,
                year: parseInt(document.getElementById('f_year').value) || null,
                rating: parseInt(document.getElementById('f_rating').value) || null,
                genres: document.getElementById('f_genres').value,
                topRank: parseInt(document.getElementById('f_topRank').value) || null,
                customLists: document.getElementById('f_customLists').value,
                description: document.getElementById('f_desc').value,
                review: document.getElementById('f_review').value
            };

            try {
                if (editingItem) {
                    // Обновление существующей записи (UPDATE)
                    const { error } = await supabase
                        .from('collection')
                        .update(payload)
                        .eq('id', editingItem.id);
                    if (error) throw error;
                } else {
                    // Создание новой записи (INSERT)
                    const { error } = await supabase
                        .from('collection')
                        .insert([payload]);
                    if (error) throw error;
                }

                cancel(); 
                await load();
            } catch (error) {
                console.error("Ошибка сохранения:", error);
                alert("Не удалось сохранить запись. Подробности в консоли.");
            } finally {
                btn.innerText = 'Сохранить'; 
                btn.disabled = false;
            }
        };

        function edit(id) {
            editingItem = currentData.find(i => String(i.id) === String(id));
            if (!editingItem) return;
            
            // Заполняем форму данными (убираем привязку к id, так как его нет в форме)
            const fields = ['type', 'title', 'poster', 'year', 'rating', 'genres', 'topRank', 'customLists', 'description', 'review'];
            
            fields.forEach(k => {
                const el = document.getElementById('f_' + k);
                if(el) el.value = editingItem[k] !== null ? editingItem[k] : '';
            });
            
            document.getElementById('formTitle').innerText = 'Редактирование';
            document.getElementById('btnCancel').style.display = 'block';
            window.scrollTo(0,0);
        }

        function cancel() {
            editingItem = null;
            document.getElementById('adminForm').reset();
            document.getElementById('formTitle').innerText = 'Добавить запись';
            document.getElementById('btnCancel').style.display = 'none';
        }

        async function del(id) {
            if(!confirm('Точно удалить?')) return;
            
            try {
                const { error } = await supabase
                    .from('collection')
                    .delete()
                    .eq('id', id);
                    
                if (error) throw error;
                await load();
            } catch (error) {
                console.error("Ошибка удаления:", error);
                alert("Не удалось удалить запись.");
            }
        }

        document.getElementById('btnCancel').onclick = cancel;
        load();
    </script>
</body>
</html>
