<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя коллекция</title>
    <style>
        :root {
            --bg-main: #141414; 
            --bg-sidebar: #0b0b0b;
            --surface: #1f1f1f;
            --primary: #e50914; 
            --text-main: #ffffff;
            --text-muted: #808080;
            --sidebar-width: 260px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg-main); color: var(--text-main); display: flex; min-height: 100vh; overflow-x: hidden; }
        
        /* Сайдбар */
        .sidebar {
            width: var(--sidebar-width); background: var(--bg-sidebar); 
            border-right: 1px solid rgba(255,255,255,0.05); padding: 30px 0;
            display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .brand { font-size: 24px; font-weight: 800; padding: 0 30px; margin-bottom: 40px; letter-spacing: 1px; }
        .brand span { color: var(--primary); }
        .sidebar h3 { padding: 0 30px; color: var(--text-muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin: 25px 0 10px; }
        .nav-item { padding: 12px 30px; color: var(--text-muted); font-size: 15px; font-weight: 500; display: block; cursor: pointer; transition: 0.2s; border-right: 3px solid transparent; }
        .nav-item:hover { color: var(--text-main); background: rgba(255,255,255,0.03); }
        .nav-item.active { color: var(--text-main); border-right-color: var(--primary); background: linear-gradient(90deg, transparent, rgba(229, 9, 20, 0.1)); }
        
        /* Основной контент */
        .main-content { flex: 1; margin-left: var(--sidebar-width); display: flex; flex-direction: column; transition: margin-left 0.3s; }
        
        /* Новая шапка */
        header { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 20px 40px; background: rgba(20, 20, 20, 0.9); 
            backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 50;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .burger { display: none; background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .tabs { display: flex; gap: 30px; }
        .tab { font-size: 16px; font-weight: 500; color: var(--text-muted); cursor: pointer; transition: 0.3s; position: relative; padding-bottom: 5px; }
        .tab:hover { color: var(--text-main); }
        .tab.active { color: var(--text-main); }
        .tab.active::after { content: ''; position: absolute; left: 0; bottom: 0; width: 100%; height: 2px; background: var(--primary); border-radius: 2px; }
        
        .content-wrapper { padding: 40px; }

        /* Сетка карточек */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 30px; }
        .card { background: var(--surface); border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; position: relative; }
        .card:hover { transform: scale(1.05); box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 2; }
        .card img { width: 100%; height: 270px; object-fit: cover; transition: 0.3s; }
        .card:hover img { opacity: 0.8; }
        .card-info { padding: 15px; }
        .card-title { font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600; }
        .card-meta { font-size: 12px; color: var(--text-muted); margin-top: 5px; display: flex; justify-content: space-between; }
        .rating { color: #f5c518; font-weight: bold; }

        /* Пустое состояние */
        .empty-state { text-align: center; color: var(--text-muted); grid-column: 1 / -1; padding: 50px 0; font-size: 18px; }

        /* Модальное окно */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center;
            z-index: 1000; padding: 20px; opacity: 0; transition: opacity 0.3s;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        
        .modal-content {
            background: var(--surface); border-radius: 12px; max-width: 850px; width: 100%;
            max-height: 90vh; overflow-y: auto; position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        
        .modal-close {
            position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6);
            border: none; color: white; width: 36px; height: 36px; border-radius: 50%;
            font-size: 20px; cursor: pointer; z-index: 10; display: flex; justify-content: center; align-items: center; transition: 0.2s;
        }
        .modal-close:hover { background: var(--primary); }
        
        .modal-body { display: flex; flex-direction: column; }
        .details-poster { flex: 0 0 300px; }
        .details-poster img { width: 100%; height: 100%; object-fit: cover; border-top-left-radius: 12px; border-top-right-radius: 12px; }
        
        .details-info { padding: 40px; flex: 1; }
        .details-title { font-size: 32px; font-weight: 800; margin-bottom: 10px; line-height: 1.2; }
        .details-tags { margin-bottom: 25px; color: var(--text-muted); font-size: 14px; display: flex; gap: 10px; flex-wrap: wrap; }
        .tag { background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 4px; }
        .details-section { margin-bottom: 25px; }
        .details-section h4 { margin-bottom: 8px; color: var(--text-main); font-size: 16px; font-weight: 600; }
        .details-section p { color: #b3b3b3; line-height: 1.6; font-size: 15px; }

        @media (min-width: 768px) {
            .modal-body { flex-direction: row; }
            .details-poster img { border-bottom-left-radius: 12px; border-top-right-radius: 0; }
        }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
            .main-content { margin-left: 0; }
            header { padding: 15px 20px; }
            .burger { display: block; }
            .content-wrapper { padding: 20px; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
            .card img { height: 210px; }
        }
    </style>
</head>
<body>

    <!-- Сайдбар -->
    <nav class="sidebar" id="sidebar">
        <div class="brand">MY<span>COLLECTION</span></div>
        <div class="nav-item active" onclick="setFilter('main', this)">🏠 Главная</div>
        
        <h3>Подборки</h3>
        <div class="nav-item" onclick="setFilter('top100', this)">⭐ ТОП 100</div>
        <div class="nav-item" onclick="setFilter('new', this)">🔥 Новинки</div>
        
        <h3>Мои списки</h3>
        <div id="dynamicLists"></div>
    </nav>

    <!-- Основной контент -->
    <main class="main-content">
        <header>
            <button class="burger" onclick="toggleSidebar()">☰</button>
            <div class="tabs" id="mainTabs">
                <div class="tab active" onclick="setCategory('movies', this)">Фильмы</div>
                <div class="tab" onclick="setCategory('series', this)">Сериалы</div>
                <div class="tab" onclick="setCategory('cartoons', this)">Мультфильмы</div>
            </div>
            <div style="width: 24px;" class="spacer"></div>
        </header>

        <div class="content-wrapper">
            <div class="grid" id="contentGrid">
                <div class="empty-state">Загрузка данных...</div>
            </div>
        </div>
    </main>

    <!-- Модальное окно -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <!-- Библиотека Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        const SUPABASE_URL = 'https://ktacbvcwsyajpeacdmwt.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0YWNidmN3c3lhanBlYWNkbXd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1NjM4NDgsImV4cCI6MjEwMDEzOTg0OH0.OhjANu7A7Wb7GUsBjVzrvjkGJlgVsehSf6EyC1DMxR8';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let allData = [];
        let currentCategory = 'movies'; 
        let currentFilter = 'main'; 

        document.addEventListener('DOMContentLoaded', init);

        async function init() {
            try {
                const { data, error } = await supabaseClient.from('collection').select('*');
                if (error) throw error;
                
                allData = data || [];
                generateCustomLists();
                render();
            } catch (error) {
                console.error("Ошибка Supabase:", error);
                document.getElementById('contentGrid').innerHTML = '<div class="empty-state" style="color:var(--primary);">Ошибка загрузки базы данных. Проверьте консоль.</div>';
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function setCategory(cat, el) {
            currentCategory = cat;
            currentFilter = 'main'; 
            
            document.getElementById('mainTabs').style.display = 'flex';
            
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');

            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.querySelector('.nav-item[onclick*="main"]').classList.add('active');
            
            render();
        }

        function setFilter(filterType, el) {
            currentFilter = filterType;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            
            const tabsContainer = document.getElementById('mainTabs');
            if (filterType === 'main') {
                tabsContainer.style.display = 'flex';
            } else {
                tabsContainer.style.display = 'none';
            }
            
            if(window.innerWidth <= 768) toggleSidebar(); 
            render();
        }

        function generateCustomLists() {
            const listSet = new Set();
            allData.forEach(item => {
                if(item.customlists) {
                    item.customlists.split(',').forEach(l => {
                        const cleanName = l.trim();
                        if(cleanName) listSet.add(cleanName);
                    });
                }
            });

            const container = document.getElementById('dynamicLists');
            container.innerHTML = Array.from(listSet).map(listName => 
                `<div class="nav-item" onclick="setFilter('${listName}', this)">📌 ${listName}</div>`
            ).join('');
        }

        function render() {
            const grid = document.getElementById('contentGrid');

            if (allData.length === 0) {
                grid.innerHTML = '<div class="empty-state">Ваша коллекция пока пуста. Добавьте первый фильм в админке!</div>';
                return;
            }

            let filtered = [];

            if (currentFilter === 'main') {
                filtered = allData.filter(i => i.type === currentCategory);
            } else {
                filtered = [...allData];
                if (currentFilter === 'top100') {
                    filtered = filtered.filter(i => i.toprank && i.toprank > 0).sort((a, b) => a.toprank - b.toprank).slice(0, 100);
                } else if (currentFilter === 'new') {
                    const sevenDaysAgo = new Date();
                    sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
                    filtered = filtered.filter(i => {
                        if (!i.created_at) return false;
                        const itemDate = new Date(i.created_at);
                        return !isNaN(itemDate) && itemDate >= sevenDaysAgo;
                    });
                } else {
                    // Точный поиск по спискам вместо простого .includes()
                    filtered = filtered.filter(i => {
                        if (!i.customlists) return false;
                        const lists = i.customlists.split(',').map(l => l.trim());
                        return lists.includes(currentFilter);
                    });
                }
            }

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-state">В этой категории пока ничего нет.</div>';
                return;
            }

            grid.innerHTML = filtered.map(item => {
                const typeName = item.type === 'movies' ? 'Фильм' : item.type === 'series' ? 'Сериал' : 'Мультфильм';
                return `
                <div class="card" onclick="openModal('${item.id}')">
                    <img src="${item.poster}" alt="Постер">
                    <div class="card-info">
                        <div class="card-title">${item.title}</div>
                        <div class="card-meta">
                            <span>${item.year} • ${typeName}</span>
                            <span class="rating">★ ${item.rating || '-'}</span>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function openModal(id) {
            const item = allData.find(i => String(i.id) === String(id));
            if (!item) return;

            const typeName = item.type === 'movies' ? 'Фильм' : item.type === 'series' ? 'Сериал' : 'Мультфильм';
            
            // Разбиваем жанры на отдельные теги для красивого отображения
            let genresHtml = '';
            if (item.genres) {
                genresHtml = item.genres.split(',').map(g => `<span class="tag">${g.trim()}</span>`).join('');
            }
            
            document.getElementById('modalBody').innerHTML = `
                <div class="details-poster">
                    <img src="${item.poster}" alt="Постер">
                </div>
                <div class="details-info">
                    <div class="details-title">${item.title}</div>
                    <div class="details-tags">
                        <span class="tag">${typeName}</span>
                        <span class="tag">${item.year}</span>
                        <span class="tag" style="color: #f5c518;">★ ${item.rating || '-'}</span>
                        ${genresHtml}
                    </div>
                    ${item.description ? `
                    <div class="details-section">
                        <h4>Описание</h4>
                        <p>${item.description}</p>
                    </div>` : ''}
                    ${item.review ? `
                    <div class="details-section">
                        <h4>Мой отзыв</h4>
                        <p>${item.review}</p>
                    </div>` : ''}
                </div>
            `;
            
            const overlay = document.getElementById('modalOverlay');
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('active'), 10);
            document.body.style.overflow = 'hidden'; 
        }

        function closeModal(event) {
            if (event && event.target.id !== 'modalOverlay' && event.target.className !== 'modal-close') return;
            const overlay = document.getElementById('modalOverlay');
            overlay.classList.remove('active');
            setTimeout(() => {
                overlay.style.display = 'none';
                document.body.style.overflow = ''; 
            }, 300);
        }
    </script>
</body>
</html>
