<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя коллекция</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2064%2064%22%3E%0A%3Crect%20width%3D%2264%22%20height%3D%2264%22%20rx%3D%2214%22%20fill%3D%22%23141414%22/%3E%0A%3Ccircle%20cx%3D%2232%22%20cy%3D%2232%22%20r%3D%2223%22%20fill%3D%22none%22%20stroke%3D%22%23e50914%22%20stroke-width%3D%223%22/%3E%0A%3Cpolygon%20points%3D%2226%2C20%2026%2C44%2046%2C32%22%20fill%3D%22%23e50914%22/%3E%0A%3C/svg%3E">
    <style>
        :root {
            --bg-main: #141414; 
            --bg-sidebar: #0b0b0b;
            --surface: #1f1f1f;
            --primary: #e50914; 
            --text-main: #ffffff;
            --text-muted: #808080;
            --sidebar-width: 260px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg-main); color: var(--text-main); display: flex; min-height: 100vh; overflow-x: hidden; }
        
        /* Сайдбар */
        .sidebar {
            width: var(--sidebar-width); background: var(--bg-sidebar); 
            border-right: 1px solid rgba(255,255,255,0.05); padding: 30px 0;
            display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            /* Минималистичный узор из точек — едва заметный, полупрозрачный */
            background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 22px 22px;
        }
        .brand { font-size: 24px; font-weight: 800; padding: 0 30px; margin-bottom: 40px; letter-spacing: 1px; }
        .brand span { color: var(--primary); }
        .sidebar h3 { 
            padding: 25px 30px 10px; margin: 15px 0 0; border-top: 1px solid rgba(255, 255, 255, 0.08); 
            color: var(--text-muted); 
            font-size: 11px; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }
        .nav-item { padding: 12px 30px; color: var(--text-muted); font-size: 15px; font-weight: 500; display: block; cursor: pointer; transition: 0.2s; border-right: 3px solid transparent; }
        .nav-item:hover { color: var(--text-main); background: rgba(255,255,255,0.03); }
        .nav-item.active { color: var(--text-main); border-right-color: var(--primary); background: linear-gradient(90deg, transparent, rgba(229, 9, 20, 0.1)); }
        
        /* Основной контент */
        .main-content { flex: 1; margin-left: var(--sidebar-width); display: flex; flex-direction: column; transition: margin-left 0.3s; }
        
        /* Новая шапка */
        header { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 20px 40px; background: rgba(20, 20, 20, 0.9); 
            backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 50;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .burger { display: none; background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .page-title {
            font-size: 34px; font-weight: 900; letter-spacing: 0.5px; line-height: 1;
        }
        @media (max-width: 768px) {
            .page-title { font-size: 24px; }
        }
        .sort-select {
            background: var(--surface); color: var(--text-main); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px; padding: 8px 12px; font-size: 14px; cursor: pointer; outline: none;
        }
        .sort-select:hover { border-color: var(--primary); }
        
        .content-wrapper { padding: 40px; }

        /* Сетка карточек */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 30px; }
        .card { background: var(--surface); border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; position: relative; }
        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5), 0 0 20px rgba(255,255,255,0.25);
            z-index: 2;
        }
        .card img { width: 100%; height: 270px; object-fit: cover; transition: 0.3s; }
        .card:hover img { opacity: 0.8; }
        .card-info { padding: 15px; }
        .card-title { font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600; }
        .card-meta { font-size: 12px; color: var(--text-muted); margin-top: 5px; display: flex; justify-content: space-between; }
        .rating { color: #f5c518; font-weight: bold; }

        /* Кнопка "Трейлер" поверх постера — полупрозрачная, проявляется при наведении */
        .card-trailer-btn {
            position: absolute; right: 10px; bottom: 82px; width: 34px; height: 34px; border-radius: 50%;
            background: rgba(0,0,0,0.65); color: #fff; display: flex; align-items: center; justify-content: center;
            font-size: 13px; padding-left: 2px; opacity: 0; transition: opacity 0.2s, background 0.2s, transform 0.2s;
            cursor: pointer; z-index: 3;
        }
        .card:hover .card-trailer-btn { opacity: 1; }
        .card-trailer-btn:hover { background: var(--primary); transform: scale(1.1); }

        /* Всплывающее окошко с трейлером */
        .trailer-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.92);
            display: none; justify-content: center; align-items: center;
            z-index: 1100; padding: 20px; opacity: 0; transition: opacity 0.25s;
        }
        .trailer-overlay.active { display: flex; opacity: 1; }
        .trailer-frame {
            width: 100%; max-width: 900px; aspect-ratio: 16 / 9; background: #000;
            border-radius: 8px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        .trailer-frame iframe { width: 100%; height: 100%; border: 0; display: block; }
        .trailer-btn-inline {
            background: var(--primary); color: #fff; border: none; border-radius: 6px;
            padding: 8px 16px; font-size: 14px; font-weight: 700; cursor: pointer; display: inline-flex;
            align-items: center; gap: 8px; margin-bottom: 20px; transition: 0.2s;
        }
        .trailer-btn-inline:hover { background: #c40812; }

        @media (max-width: 768px) {
            /* На тач-устройствах ховера нет — кнопка трейлера видна всегда, но компактнее */
            .card-trailer-btn { opacity: 1; width: 28px; height: 28px; font-size: 11px; right: 6px; bottom: 66px; }
        }

        /* Пустое состояние */
        .empty-state { text-align: center; color: var(--text-muted); grid-column: 1 / -1; padding: 50px 0; font-size: 18px; }

        /* Главная — дашборд со статистикой и рядами подборок */
        .stats-bar { display: flex; gap: 20px; margin-bottom: 40px; flex-wrap: wrap; }
        .stat-box {
            flex: 1; min-width: 140px; background: var(--surface); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px; padding: 20px; text-align: center; transition: transform 0.2s, border-color 0.2s;
        }
        .stat-box:hover { transform: translateY(-3px); border-color: rgba(229,9,20,0.3); }
        .stat-value { font-size: 32px; font-weight: 900; color: var(--primary); line-height: 1; }
        .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 8px; text-transform: uppercase; letter-spacing: 0.5px; }

        .home-section { margin-bottom: 40px; }
        .home-section-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px; gap: 12px; }
        .home-section-header h2 { 
            font-size: 26px; /* Было 20px — увеличили для выразительности */
            font-weight: 800; /* Делаем шрифт немного жирнее для солидности */
            letter-spacing: 0.5px; /* Чуть разряжаем буквы для стильного вида */
        }        
        .see-all { font-size: 13px; color: var(--text-muted); cursor: pointer; transition: color 0.2s; white-space: nowrap; }
        .see-all:hover { color: var(--primary); }

        .home-row { 
            display: flex; 
            gap: 20px; 
            overflow-x: auto; 
            
            /* Даем много места: карточка растет вверх/вниз + отбрасывает большую тень */
            padding-top: 30px; 
            /* Снизу отступ максимальный, так как в твоем коде тень смещена вниз (0 10px 25px) */
            padding-bottom: 45px; 
            padding-left: 25px; 
            padding-right: 25px;
            
            /* Стягиваем пространство обратно, чтобы ряды и заголовки не разъехались */
            margin-top: -15px; /* Придвигаем ряд чуть ближе к заголовку подборки */
            margin-bottom: -15px; /* Убираем лишнюю пустоту снизу */
            margin-left: -25px; 
            margin-right: -25px;
            
            scrollbar-width: thin; 
            scrollbar-color: rgba(255,255,255,0.15) transparent; 
        }
        .home-row .card { flex: 0 0 180px; }
        .home-row::-webkit-scrollbar { height: 6px; }
        .home-row::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

        @media (max-width: 768px) {
            .stats-bar { gap: 10px; }
            .stat-box { min-width: 90px; padding: 14px; }
            .stat-value { font-size: 20px; }
            .stat-label { font-size: 10px; }
            .home-row .card { flex-basis: 130px; }
            .home-section-header h2 { font-size: 22px; }
        }

        /* ТОП 100 — список по одному фильму в строку */
        .top100-list { display: flex; flex-direction: column; gap: 14px; }
        .top100-row {
            display: flex; align-items: center; gap: 24px;
            background: var(--surface); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px; padding: 14px 24px; cursor: pointer;
            transition: transform 0.25s, box-shadow 0.25s, background 0.25s;
        }
        .top100-row:hover { background: #262626; transform: translateX(6px); box-shadow: 0 10px 25px rgba(0,0,0,0.45); }

        .top100-rank {
            flex: 0 0 80px; text-align: center; font-size: 42px; font-weight: 900;
            font-style: italic; color: #3a3a3a; -webkit-text-stroke: 1px rgba(255,255,255,0.12);
            line-height: 1;
        }
        .top100-rank.gold   { background: linear-gradient(180deg, #ffe98a, #d4a017); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 2px 12px rgba(212,160,23,0.4); -webkit-text-stroke: 0; }
        .top100-rank.silver { background: linear-gradient(180deg, #f2f2f2, #a8a8a8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 2px 12px rgba(168,168,168,0.35); -webkit-text-stroke: 0; }
        .top100-rank.bronze { background: linear-gradient(180deg, #e3a765, #a35d2d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 2px 12px rgba(163,93,45,0.35); -webkit-text-stroke: 0; }

        .top100-poster { flex: 0 0 70px; width: 70px; height: 100px; object-fit: cover; border-radius: 8px; background: #000; }
        .top100-info { flex: 1; min-width: 0; }
        .top100-title { font-size: 19px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .top100-meta { font-size: 13px; color: var(--text-muted); margin-top: 8px; display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
        .top100-meta .rating { color: #f5c518; font-weight: bold; font-size: 14px; }

        @media (max-width: 768px) {
            .top100-row { gap: 14px; padding: 10px 14px; }
            .top100-rank { flex-basis: 44px; font-size: 26px; }
            .top100-poster { flex-basis: 50px; width: 50px; height: 74px; }
            .top100-title { font-size: 15px; }
            .top100-meta { font-size: 11px; gap: 8px; }
        }

        /* Модальное окно */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center;
            z-index: 1000; padding: 20px; opacity: 0; transition: opacity 0.3s;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        
        .modal-content {
            background: var(--surface); border-radius: 12px; max-width: 850px; width: 100%;
            max-height: 90vh; overflow-y: auto; position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        
        .modal-close {
            position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6);
            border: none; color: white; width: 36px; height: 36px; border-radius: 50%;
            font-size: 20px; cursor: pointer; z-index: 10; display: flex; justify-content: center; align-items: center; transition: 0.2s;
        }
        .modal-close:hover { background: var(--primary); }
        
        .modal-body { display: flex; flex-direction: column; }
        .details-poster { flex: 0 0 300px; display: flex; align-items: flex-start; }
        .details-poster img { width: 100%; height: auto; object-fit: cover; border-top-left-radius: 12px; border-top-right-radius: 12px; }
        
        .details-info { padding: 40px; flex: 1; }
        .details-title { font-size: 32px; font-weight: 800; margin-bottom: 10px; line-height: 1.2; }
        .details-tags { margin-bottom: 25px; color: var(--text-muted); font-size: 14px; display: flex; gap: 10px; flex-wrap: wrap; }
        .tag { background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 4px; }
        .details-section { margin-bottom: 25px; }
        .details-section h4 { margin-bottom: 8px; color: var(--text-main); font-size: 16px; font-weight: 600; }
        .details-section p { color: #b3b3b3; line-height: 1.6; font-size: 15px; }

        @media (min-width: 768px) {
            .modal-body { flex-direction: row; align-items: flex-start; }
            .details-poster { position: sticky; top: 0; }
            .details-poster img { border-bottom-left-radius: 12px; border-top-right-radius: 0; }
        }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
            .main-content { margin-left: 0; }
            header { padding: 15px 20px; }
            .burger { display: block; }
            .content-wrapper { padding: 20px; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
            .card img { height: 210px; }
        }

        .back-to-main-btn {
            background: rgba(255,255,255,0.08); 
            border: none; 
            color: #999; 
            width: 32px; 
            height: 32px; 
            border-radius: 50%; 
            font-size: 14px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: all 0.2s;
            margin-top: 4px; /* Выравниваем по центру относительно крупного шрифта заголовка */
        }
        .back-to-main-btn:hover {
            background: rgba(255,255,255,0.18);
            color: #fff;
            transform: scale(1.1);
        }
        
    </style>
</head>
<body>

    <!-- Сайдбар -->
    <nav class="sidebar" id="sidebar">
        <div class="brand">MY<span>COLLECTION</span></div>
        <div class="nav-item active" data-filter="main" onclick="setFilter('main', this)">Главная</div>

        <h3>Категории</h3>
        <div class="nav-item" data-filter="movies" onclick="setFilter('movies', this)">Фильмы</div>
        <div class="nav-item" data-filter="series" onclick="setFilter('series', this)">Сериалы</div>
        <div class="nav-item" data-filter="cartoons" onclick="setFilter('cartoons', this)">Мультфильмы</div>

        <h3>Подборки</h3>
        <div class="nav-item" data-filter="top100" onclick="setFilter('top100', this)">ТОП 100</div>
        <div class="nav-item" data-filter="new" onclick="setFilter('new', this)">Новинки</div>
        <div class="nav-item" data-filter="recent" onclick="setFilter('recent', this)">Недавно добавлено</div>
        <div class="nav-item" data-filter="rewatch" onclick="setFilter('rewatch', this)">Пересматриваем любимое</div>
        
        <h3>Мои списки</h3>
        <div id="dynamicLists"></div>
    </nav>

    <!-- Основной контент -->
    <main class="main-content">
        <header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <button class="burger" onclick="toggleSidebar()">☰</button>
        <div class="page-title" id="pageTitle">Главная</div>
        <!-- Новая кнопка-крестик (по умолчанию скрыта на Главной) -->
        <button id="backToMainBtn" class="back-to-main-btn" onclick="goToFilter('main')" style="display: none;" title="Вернуться на главную">✕</button>
    </div>
    
    <div style="display: none; gap: 10px; flex-wrap: wrap;" id="filtersBar">
        <!-- Новый фильтр по жанрам -->
        <select class="sort-select" id="genreSelect" onchange="setGenreFilter(this.value)">
            <option value="all">Все жанры</option>
        </select>

        <select class="sort-select" id="sortSelect" onchange="setSort(this.value)">
            <option value="default">Сортировка: по умолчанию</option>
            <option value="rating_desc">Рейтинг: сначала высокий</option>
            <option value="rating_asc">Рейтинг: сначала низкий</option>
            <option value="year_desc">Год выхода: сначала новые</option>
            <option value="year_asc">Год выхода: сначала старые</option>
        </select>
    </div>
</header>

        <div class="content-wrapper">
            <div class="grid" id="contentGrid">
                <div class="empty-state">Загрузка данных...</div>
            </div>
        </div>
    </main>

    <!-- Модальное окно -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <!-- Окошко с трейлером -->
    <div class="trailer-overlay" id="trailerOverlay" onclick="closeTrailer(event)">
        <button class="modal-close" onclick="closeTrailer()">&times;</button>
        <div class="trailer-frame" id="trailerFrame"></div>
    </div>

    <!-- Библиотека Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Подключаем наши общие функции -->
    <script src="poster-helpers.js"></script>
    
    <script>
        const SUPABASE_URL = 'https://ktacbvcwsyajpeacdmwt.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0YWNidmN3c3lhanBlYWNkbXd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1NjM4NDgsImV4cCI6MjEwMDEzOTg0OH0.OhjANu7A7Wb7GUsBjVzrvjkGJlgVsehSf6EyC1DMxR8';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let allData = [];
        let currentFilter = 'main'; 
        let currentSort = 'default';
        let currentGenre = 'all'; 

        // Собираем уникальные жанры и добавляем их в select
        function generateGenres() {
            const genreSet = new Set();
            allData.forEach(item => {
                if(item.genres) {
                    item.genres.split(',').forEach(g => {
                        const cleanName = g.trim();
                        if(cleanName) genreSet.add(cleanName);
                    });
                }
            });
        
            const select = document.getElementById('genreSelect');
            // Сортируем жанры по алфавиту
            const sortedGenres = Array.from(genreSet).sort((a, b) => a.localeCompare(b, 'ru'));
            
            sortedGenres.forEach(genre => {
                const option = document.createElement('option');
                option.value = genre;
                option.textContent = genre;
                select.appendChild(option);
            });
        }
        
        function setGenreFilter(genre) {
            currentGenre = genre;
            render();
        }

        const FILTER_TITLES = {
            main: 'Главная',
            movies: 'Фильмы',
            series: 'Сериалы',
            cartoons: 'Мультфильмы',
            top100: 'ТОП 100',
            new: 'Новинки',
            recent: 'Недавно добавлено',
            rewatch: 'Пересматриваем любимое'
        };

        const TYPE_NAMES = {
            movies: 'Фильм',
            series: 'Сериал',
            cartoons: 'Мультфильм'
        };

        function getTypeName(type) {
            return TYPE_NAMES[type] || 'Неизвестно';
        }

        function getUniqueCustomLists() {
            const listSet = new Set();
            allData.forEach(item => {
                if (item.customlists) {
                    item.customlists.split(',').forEach(l => {
                        const cleanName = l.trim();
                        if (cleanName) listSet.add(cleanName);
                    });
                }
            });
            return Array.from(listSet); // Сразу отдаем чистый массив
        }
        
        document.addEventListener('DOMContentLoaded', init);

        async function init() {
            try {
                const { data, error } = await supabaseClient.from('collection').select('*');
                if (error) throw error;
                
                allData = data || [];
                generateCustomLists();
                generateGenres();
                render();
            } catch (error) {
                console.error("Ошибка Supabase:", error);
                document.getElementById('contentGrid').innerHTML = '<div class="empty-state" style="color:var(--primary);">Ошибка загрузки базы данных. Проверьте консоль.</div>';
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function setFilter(filterType, el) {
            currentFilter = filterType;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        
            document.getElementById('pageTitle').textContent = FILTER_TITLES[filterType] || el.textContent.trim();
            
            // Сброс фильтра жанров при смене вкладки сайдбара
            document.getElementById('genreSelect').value = 'all';
            currentGenre = 'all';

            // На Главной жанры/сортировка не нужны — там сборная подборка из разных категорий
            document.getElementById('filtersBar').style.display = (filterType === 'main') ? 'none' : 'flex';

            // Управление видимостью кнопки возврата на главную
            const backBtn = document.getElementById('backToMainBtn');
            if (backBtn) {
                backBtn.style.display = (filterType === 'main') ? 'none' : 'flex';
            }
            
            if(window.innerWidth <= 768) toggleSidebar(); 
            render();
        }

        // Программный переход на раздел (используется кнопками "Смотреть все →" на Главной)
        function goToFilter(filterType) {
            const el = document.querySelector('.nav-item[data-filter="' + CSS.escape(filterType) + '"]');
            if (el) {
                setFilter(filterType, el);
            } else {
                currentFilter = filterType;
                render();
            }
        }

        function setSort(sortType) {
            currentSort = sortType;
            render();
        }

        function generateCustomLists() {
            const uniqueLists = getUniqueCustomLists();
            const container = document.getElementById('dynamicLists');
            
            container.innerHTML = uniqueLists.map(listName => 
                `<div class="nav-item" data-filter="${escapeAttr(listName)}" onclick="setFilter('${listName.replace(/'/g, "\\'")}', this)">📌 ${listName}</div>`
            ).join('');
        }


        function render() {
            const grid = document.getElementById('contentGrid');

            if (allData.length === 0) {
                grid.className = 'grid';
                grid.innerHTML = '<div class="empty-state">Ваша коллекция пока пуста. Добавьте первый фильм в админке!</div>';
                return;
            }

            if (currentFilter === 'main') {
                renderHome();
                return;
            }

            let filtered = [...allData];

            // 1. Фильтрация по боковому меню (категории, подборки, списки)
            if (currentFilter === 'movies' || currentFilter === 'series' || currentFilter === 'cartoons') {
                filtered = filtered.filter(i => i.type === currentFilter);
            } else if (currentFilter === 'top100') {
                filtered = filtered.filter(i => i.toprank && i.toprank > 0).sort((a, b) => a.toprank - b.toprank).slice(0, 100);
            } else if (currentFilter === 'new') {
                // Новинки кино: фильтруем по текущему году (динамически берет год из системы)
                const currentYear = new Date().getFullYear(); 
                filtered = filtered.filter(i => i.year === currentYear);
            } else if (currentFilter === 'recent') {
                // Недавно добавленные на сайт: последние 12 записей по дате создания
                filtered = [...filtered]
                    .filter(i => i.created_at && !isNaN(new Date(i.created_at)))
                    .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
                    .slice(0, 12);
            } else if (currentFilter === 'rewatch') {
                filtered = filtered.filter(i => i.rewatch === true);
            } else {
                // Точный поиск по спискам вместо простого .includes()
                filtered = filtered.filter(i => {
                    if (!i.customlists) return false;
                    const lists = i.customlists.split(',').map(l => l.trim());
                    return lists.includes(currentFilter);
                });
            }

            // --- НОВЫЙ БЛОК: Фильтрация по жанрам из верхнего меню ---
            if (currentGenre !== 'all') {
                filtered = filtered.filter(i => {
                    if (!i.genres) return false;
                    const itemGenres = i.genres.split(',').map(g => g.trim());
                    return itemGenres.includes(currentGenre);
                });
            }
            // ----------------------------------------------------------

            // 2. Сортировка по рейтингу или году выхода (переопределяет порядок по умолчанию)
            if (currentSort === 'rating_desc') {
                filtered.sort((a, b) => (b.rating ?? -1) - (a.rating ?? -1));
            } else if (currentSort === 'rating_asc') {
                filtered.sort((a, b) => (a.rating ?? 999) - (b.rating ?? 999));
            } else if (currentSort === 'year_desc') {
                filtered.sort((a, b) => (b.year ?? 0) - (a.year ?? 0));
            } else if (currentSort === 'year_asc') {
                filtered.sort((a, b) => (a.year ?? 9999) - (b.year ?? 9999));
            }
            
            if (filtered.length === 0) {
                grid.className = 'grid';
                grid.innerHTML = '<div class="empty-state">В этой категории пока ничего нет.</div>';
                return;
            }

            if (currentFilter === 'top100') {
                grid.className = 'top100-list';
                grid.innerHTML = filtered.map(item => renderTop100Row(item)).join('');
            } else {
                grid.className = 'grid';
                grid.innerHTML = filtered.map(item => renderCard(item)).join('');
            }
        }

        // ===== Главная: статистика + ряды подборок =====

        function computeStats(data) {
            const total = data.length;
            const movies = data.filter(i => i.type === 'movies').length;
            const series = data.filter(i => i.type === 'series').length;
            const cartoons = data.filter(i => i.type === 'cartoons').length;
            const rated = data.filter(i => i.rating !== null && i.rating !== undefined && i.rating !== '');
            const avgRating = rated.length ? (rated.reduce((s, i) => s + Number(i.rating), 0) / rated.length) : null;
            return { total, movies, series, cartoons, avgRating };
        }

        function renderHome() {
            const grid = document.getElementById('contentGrid');
            grid.className = 'home-dashboard';

            const stats = computeStats(allData);

            let html = `
            <div class="stats-bar">
                <div class="stat-box"><div class="stat-value">${stats.total}</div><div class="stat-label">Всего в коллекции</div></div>
                <div class="stat-box"><div class="stat-value">${stats.movies}</div><div class="stat-label">Фильмов</div></div>
                <div class="stat-box"><div class="stat-value">${stats.series}</div><div class="stat-label">Сериалов</div></div>
                <div class="stat-box"><div class="stat-value">${stats.cartoons}</div><div class="stat-label">Мультфильмов</div></div>
                <div class="stat-box"><div class="stat-value">${stats.avgRating ? stats.avgRating.toFixed(1) : '-'}</div><div class="stat-label">Средняя оценка</div></div>
            </div>
            `;

            let anySection = false;

            // Недавно добавлено — 7 последних загруженных на сайт фильмов
            const recent = [...allData]
                .filter(i => i.created_at && !isNaN(new Date(i.created_at)))
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
                .slice(0, 7);
            if (recent.length) { html += renderHomeSection('Недавно добавлено', recent, 'recent'); anySection = true; }

            // Новинки кино — 7 фильмов, вышедших в текущем году
            const currentYear = new Date().getFullYear();
            const newReleases = allData.filter(i => i.year === currentYear).slice(0, 7);
            if (newReleases.length) { html += renderHomeSection('Новинки', newReleases, 'new'); anySection = true; }
            
            // ТОП 100 — первые 7 по рангу
            const top = [...allData]
                .filter(i => i.toprank && i.toprank > 0)
                .sort((a, b) => a.toprank - b.toprank)
                .slice(0, 7);
            if (top.length) { html += renderHomeSection('ТОП 100', top, 'top100'); anySection = true; }

            // Пересматриваем любимое
            const rewatch = allData.filter(i => i.rewatch === true).slice(0, 7);
            if (rewatch.length) { html += renderHomeSection('Пересматриваем любимое', rewatch, 'rewatch'); anySection = true; }

            // Кастомные списки — по 7 фильмов из каждого
            const uniqueLists = getUniqueCustomLists();
            
            uniqueLists.forEach(listName => {
                const items = allData.filter(i => {
                    if (!i.customlists) return false;
                    return i.customlists.split(',').map(l => l.trim()).includes(listName);
                }).slice(0, 7);
                
                if (items.length) { 
                    html += renderHomeSection(listName, items, listName); 
                    anySection = true; 
                }
            });

            if (!anySection) {
                html += '<div class="empty-state">Пока нечего показать — добавьте фильмы в подборки.</div>';
            }

            grid.innerHTML = html;
        }

        function renderHomeSection(title, items, filterKey) {
            return `
            <div class="home-section">
                <div class="home-section-header">
                    <h2>${escapeAttr(title)}</h2>
                    <span class="see-all" onclick="goToFilter('${filterKey.replace(/'/g, "\\'")}')">Смотреть все →</span>
                </div>
                <div class="home-row">${items.map(renderCard).join('')}</div>
            </div>
            `;
        }

        function renderCard(item) {
            const typeName = getTypeName(item.type);
            const trailerBtn = item.trailer ? `<div class="card-trailer-btn" onclick="openTrailer('${escapeAttr(item.trailer)}', event)" title="Смотреть трейлер">▶</div>` : '';
            return `
            <div class="card" onclick="openModal('${item.id}')">
                <img src="${posterSrc(item.poster)}" data-original="${escapeAttr(item.poster)}" onerror="handlePosterError(this)" alt="Постер" loading="lazy" decoding="async">
                ${trailerBtn}
                <div class="card-info">
                    <div class="card-title">${item.title}</div>
                    <div class="card-meta">
                        <span>${item.year} • ${typeName}</span>
                        <span class="rating">★ ${item.rating || '-'}</span>
                    </div>
                </div>
            </div>
            `;
        }

        function renderTop100Row(item) {
            const typeName = getTypeName(item.type);
            const rank = item.toprank;
            const rankClass = rank === 1 ? 'gold' : rank === 2 ? 'silver' : rank === 3 ? 'bronze' : '';
            const trailerLink = item.trailer ? `<span class="see-all" onclick="openTrailer('${escapeAttr(item.trailer)}', event)">▶ Трейлер</span>` : '';
            return `
            <div class="top100-row" onclick="openModal('${item.id}')">
                <div class="top100-rank ${rankClass}">${rank}</div>
                <img class="top100-poster" src="${posterSrc(item.poster)}" data-original="${escapeAttr(item.poster)}" onerror="handlePosterError(this)" alt="Постер" loading="lazy" decoding="async">
                <div class="top100-info">
                    <div class="top100-title">${item.title}</div>
                    <div class="top100-meta">
                        <span>${item.year} • ${typeName}</span>
                        <span class="rating">★ ${item.rating || '-'}</span>
                        ${trailerLink}
                    </div>
                </div>
            </div>
            `;
        }

        function openModal(id) {
            const item = allData.find(i => String(i.id) === String(id));
            if (!item) return;
        
            const typeName = getTypeName(item.type);
            
            let genresHtml = '';
            if (item.genres) {
                genresHtml = item.genres.split(',').map(g => `<span class="tag">${g.trim()}</span>`).join('');
            }
            
            // --- ПРЕОБРАЗОВАНИЕ ШОРТКОДОВ В АДАПТИВНЫЙ HTML ---
            // CSS-свойство max-width: 100% и height: auto гарантируют адаптивность под любые экраны
            const imgStyle = 'max-width: 100%; height: auto; border-radius: 8px; margin: 15px 0; display: block; box-shadow: 0 5px 15px rgba(0,0,0,0.5);';
            
            let formattedDesc = (item.description || '').replace(/\[img\](.*?)\[\/img\]/gi, `<img src="$1" style="${imgStyle}" alt="Иллюстрация">`);
            let formattedReview = (item.review || '').replace(/\[img\](.*?)\[\/img\]/gi, `<img src="$1" style="${imgStyle}" alt="Иллюстрация">`);
            // --------------------------------------------------
        
            document.getElementById('modalBody').innerHTML = `
                <div class="details-poster">
                    <img src="${posterSrc(item.poster)}" data-original="${escapeAttr(item.poster)}" onerror="handlePosterError(this)" alt="Постер" loading="lazy" decoding="async">
                </div>
                <div class="details-info">
                    <div class="details-title">${item.title}</div>
                    <div class="details-tags">
                        <span class="tag">${typeName}</span>
                        <span class="tag">${item.year}</span>
                        <span class="tag" style="color: #f5c518;">★ ${item.rating || '-'}</span>
                        ${genresHtml}
                    </div>
                    ${item.trailer ? `<button type="button" class="trailer-btn-inline" onclick="openTrailer('${escapeAttr(item.trailer)}', event)">▶ Смотреть трейлер</button>` : ''}
                    ${item.description ? `
                    <div class="details-section">
                        <h4>Описание</h4>
                        <p style="white-space: pre-wrap; line-height: 1.6;">${formattedDesc}</p>
                    </div>` : ''}
                    ${item.review ? `
                    <div class="details-section">
                        <h4>Мой отзыв</h4>
                        <p style="white-space: pre-wrap; line-height: 1.6;">${formattedReview}</p>
                    </div>` : ''}
                </div>
            `;
            
            const overlay = document.getElementById('modalOverlay');
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('active'), 10);
            document.body.style.overflow = 'hidden'; 
        }

        function closeModal(event) {
            if (event && event.target.id !== 'modalOverlay' && event.target.className !== 'modal-close') return;
            const overlay = document.getElementById('modalOverlay');
            overlay.classList.remove('active');
            setTimeout(() => {
                overlay.style.display = 'none';
                document.body.style.overflow = ''; 
            }, 300);
        }

        // ===== Окошко с трейлером =====

        // Достаёт ID видео из разных форматов ссылок YouTube (или принимает уже готовый ID)
        function extractYouTubeId(url) {
            if (!url) return null;
            const trimmed = url.trim();
            const m = trimmed.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([\w-]{6,})/);
            if (m) return m[1];
            if (/^[\w-]{6,}$/.test(trimmed)) return trimmed;
            return null;
        }

        function openTrailer(url, event) {
            if (event) event.stopPropagation();
            const id = extractYouTubeId(url);
            if (!id) return;

            document.getElementById('trailerFrame').innerHTML =
                `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&rel=0" title="Трейлер" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>`;

            const overlay = document.getElementById('trailerOverlay');
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('active'), 10);
            document.body.style.overflow = 'hidden';
        }

        function closeTrailer(event) {
            if (event && event.target.id !== 'trailerOverlay' && event.target.className !== 'modal-close') return;
            const overlay = document.getElementById('trailerOverlay');
            overlay.classList.remove('active');
            setTimeout(() => {
                overlay.style.display = 'none';
                document.getElementById('trailerFrame').innerHTML = ''; // останавливаем видео при закрытии
                document.body.style.overflow = '';
            }, 250);
        }

        // Закрытие по Esc — в дополнение к клику по крестику/фону, а не вместо них.
        // Если открыто окошко с трейлером — закрываем сначала его, иначе карточку фильма.
        document.addEventListener('keydown', (e) => {
            if (e.key !== 'Escape') return;
            const trailerOverlay = document.getElementById('trailerOverlay');
            const modalOverlay = document.getElementById('modalOverlay');
            
            // Если открыт трейлер — закрываем его
            if (trailerOverlay && trailerOverlay.classList.contains('active')) {
                closeTrailer();
            } 
            // Иначе, если открыта карточка фильма — закрываем её
            else if (modalOverlay && modalOverlay.classList.contains('active')) {
                closeModal();
            } 
            // Иначе, если мы не на Главной странице — возвращаемся на неё
            else if (currentFilter !== 'main') {
                goToFilter('main');
            }
        });
    </script>
</body>
</html>
