<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя коллекция</title>
    <style>
        :root {
            --bg-start: #0f111a; --bg-end: #1a0b1c;
            --glass: rgba(30, 30, 45, 0.7);
            --primary: #e50914; --text: #ffffff;
            --sidebar-width: 250px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, var(--bg-start), var(--bg-end)) fixed; color: var(--text); display: flex; min-height: 100vh; }
        
        /* Сайдбар */
        .sidebar {
            width: var(--sidebar-width); background: rgba(15, 17, 26, 0.9); backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255,255,255,0.05); padding: 20px 0;
            display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100;
            transition: transform 0.3s ease;
        }
        .sidebar h3 { padding: 0 20px; color: rgba(255,255,255,0.5); font-size: 12px; text-transform: uppercase; margin: 20px 0 10px; }
        .nav-item { padding: 12px 20px; color: var(--text); text-decoration: none; display: block; cursor: pointer; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); border-left: 4px solid var(--primary); }
        
        /* Основной контент */
        .main-content { flex: 1; margin-left: var(--sidebar-width); padding: 20px; transition: margin-left 0.3s ease; }
        
        /* Шапка */
        header { display: flex; align-items: center; justify-content: flex-end; position: relative; margin-bottom: 30px; padding: 10px 0; }
        .burger { display: none; background: none; border: none; color: white; font-size: 24px; cursor: pointer; position: absolute; left: 0; }
        .tabs { position: absolute; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; background: var(--glass); padding: 5px; border-radius: 12px; }
        .tab { padding: 8px 16px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: 500; }
        .tab.active { background: var(--primary); }
        .brand { font-size: 24px; font-weight: bold; letter-spacing: 1px; }

        /* Сетка карточек */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .card { background: var(--glass); border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: transform 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .card img { width: 100%; height: 240px; object-fit: cover; }
        .card-info { padding: 10px; }
        .card-title { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: bold; }
        .card-meta { font-size: 12px; color: #a0a5b5; margin-top: 5px; }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .burger { display: block; }
            header { justify-content: center; flex-direction: column; gap: 15px; margin-top: 15px; }
            .tabs { position: static; transform: none; width: 100%; justify-content: center; }
            .brand { display: none; /* Скрываем на мобилках для экономии места или можно оставить */ }
            .grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
            .card img { height: 200px; }
        }
    </style>
</head>
<body>

    <!-- Сайдбар -->
    <nav class="sidebar" id="sidebar">
        <div class="nav-item active" onclick="setFilter('main', this)">Главная страница</div>
        
        <h3>Подборки</h3>
        <div class="nav-item" onclick="setFilter('top100', this)">⭐ ТОП 100</div>
        <div class="nav-item" onclick="setFilter('new', this)">🔥 Новинки</div>
        
        <h3>Мои списки</h3>
        <div id="dynamicLists"></div>
    </nav>

    <!-- Основной контент -->
    <main class="main-content">
        <header>
            <button class="burger" onclick="toggleSidebar()">☰</button>
            <div class="tabs">
                <div class="tab active" onclick="setCategory('movies', this)">Фильмы</div>
                <div class="tab" onclick="setCategory('series', this)">Сериалы</div>
                <div class="tab" onclick="setCategory('cartoons', this)">Мультфильмы</div>
            </div>
            <div class="brand">Коллекция</div>
        </header>

        <div class="grid" id="contentGrid">
            <p style="text-align: center; grid-column: 1 / -1;">Загрузка данных...</p>
        </div>
    </main>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxw60jw7Wq9702RABq43LwFFvrYIlYoTM2UjjNvk4oXEWqdftdzPRhBb3m4I-ePMzmA/exec';
        
        let allData = [];
        let currentCategory = 'movies'; // movies, series, cartoons
        let currentFilter = 'main'; // main, top100, new, или название кастомного списка

        document.addEventListener('DOMContentLoaded', init);

        async function init() {
            try {
                const res = await fetch(API_URL);
                allData = await res.json();
                generateCustomLists();
                render();
            } catch (error) {
                document.getElementById('contentGrid').innerHTML = '<p>Ошибка загрузки.</p>';
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function setCategory(cat, el) {
            currentCategory = cat;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            render();
        }

        function setFilter(filterType, el) {
            currentFilter = filterType;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            if(window.innerWidth <= 768) toggleSidebar(); // Закрываем меню на мобилках после клика
            render();
        }

        // Вытаскиваем все уникальные списки из базы
        function generateCustomLists() {
            const listSet = new Set();
            allData.forEach(item => {
                if(item.customLists) {
                    item.customLists.split(',').forEach(l => {
                        const cleanName = l.trim();
                        if(cleanName) listSet.add(cleanName);
                    });
                }
            });

            const container = document.getElementById('dynamicLists');
            container.innerHTML = Array.from(listSet).map(listName => 
                `<div class="nav-item" onclick="setFilter('${listName}', this)">📌 ${listName}</div>`
            ).join('');
        }

        function render() {
            // 1. Фильтруем по категории (Табы в шапке)
            let filtered = allData.filter(i => i.type === currentCategory);

            // 2. Применяем фильтры сайдбара
            if (currentFilter === 'top100') {
                filtered = filtered.filter(i => i.topRank && i.topRank > 0)
                                   .sort((a, b) => a.topRank - b.topRank)
                                   .slice(0, 100);
            } else if (currentFilter === 'new') {
                const sevenDaysAgo = Date.now() - (7 * 24 * 60 * 60 * 1000);
                // Если timestamp нет (старые записи), считаем их не новыми
                filtered = filtered.filter(i => i.timestamp && i.timestamp >= sevenDaysAgo);
            } else if (currentFilter !== 'main') {
                // Это кастомный список
                filtered = filtered.filter(i => i.customLists && i.customLists.includes(currentFilter));
            }

            // Вывод карточек
            const grid = document.getElementById('contentGrid');
            if (filtered.length === 0) {
                grid.innerHTML = '<p style="text-align: center; grid-column: 1 / -1; color: #a0a5b5;">Ничего не найдено.</p>';
                return;
            }

            grid.innerHTML = filtered.map(item => `
                <div class="card">
                    <img src="${item.poster}" alt="Постер">
                    <div class="card-info">
                        <div class="card-title">${item.title}</div>
                        <div class="card-meta">${item.year} • ★ ${item.rating}</div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
