<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя коллекция</title>
    <style>
        :root {
            --bg-start: #0f111a; --bg-end: #1a0b1c;
            --glass: rgba(30, 30, 45, 0.7);
            --primary: #e50914; --text: #ffffff;
            --sidebar-width: 250px;
            --border-radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, var(--bg-start), var(--bg-end)) fixed; color: var(--text); display: flex; min-height: 100vh; }
        
        /* Сайдбар */
        .sidebar {
            width: var(--sidebar-width); background: rgba(15, 17, 26, 0.9); backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255,255,255,0.05); padding: 20px 0;
            display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100;
            transition: transform 0.3s ease;
        }
        .sidebar h3 { padding: 0 20px; color: rgba(255,255,255,0.5); font-size: 12px; text-transform: uppercase; margin: 20px 0 10px; }
        .nav-item { padding: 12px 20px; color: var(--text); text-decoration: none; display: block; cursor: pointer; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); border-left: 4px solid var(--primary); }
        
        /* Основной контент */
        .main-content { flex: 1; margin-left: var(--sidebar-width); padding: 20px 40px; transition: margin-left 0.3s ease; }
        
        /* Красивая шапка */
        header { 
            display: flex; align-items: center; justify-content: flex-end; 
            position: relative; margin-bottom: 40px; padding: 15px 30px; 
            background: rgba(0,0,0,0.2); border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.05);
        }
        .burger { display: none; background: none; border: none; color: white; font-size: 24px; cursor: pointer; position: absolute; left: 20px; }
        .tabs { position: absolute; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; background: var(--glass); padding: 5px; border-radius: 12px; }
        .tab { padding: 8px 16px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: 500; }
        .tab.active { background: var(--primary); }
        
        /* Надпись "Коллекция" */
        .brand { 
            font-size: 28px; 
            font-weight: 800; 
            letter-spacing: 1.5px; 
            margin-right: 20px; /* Отступ от правого края */
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 15px rgba(255, 75, 43, 0.3);
        }

        /* Сетка карточек */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 25px; }
        .card { background: var(--glass); border-radius: var(--border-radius); overflow: hidden; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: transform 0.3s, border-color 0.3s; }
        .card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .card-info { padding: 12px; }
        .card-title { font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: bold; }
        .card-meta { font-size: 12px; color: #a0a5b5; margin-top: 5px; }

        /* Модальное окно */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: center;
            z-index: 1000; padding: 20px; opacity: 0; transition: opacity 0.3s;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        
        .modal-content {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; max-width: 800px; width: 100%;
            max-height: 90vh; overflow-y: auto; position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }
        
        .modal-close {
            position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.5);
            border: none; color: white; width: 35px; height: 35px; border-radius: 50%;
            font-size: 20px; cursor: pointer; z-index: 10; display: flex;
            justify-content: center; align-items: center; transition: 0.3s;
        }
        .modal-close:hover { background: var(--primary); transform: rotate(90deg); }
        
        .modal-body { display: flex; flex-direction: column; }
        
        .details-poster { flex: 0 0 320px; align-self: flex-start; }
        .details-poster img {
            width: 100%; height: auto; object-fit: contain;
            border-top-left-radius: 15px; border-top-right-radius: 15px;
        }
        
        .details-info { padding: 30px; flex: 1; }
        .details-title { font-size: 28px; font-weight: bold; margin-bottom: 10px; color: #fff; }
        .details-tags { margin-bottom: 25px; color: #a0a5b5; font-size: 15px; line-height: 1.6; }
        .details-section { margin-bottom: 20px; }
        .details-section h4 { margin-bottom: 8px; color: var(--primary); font-size: 16px; }
        .details-section p { color: #ccc; line-height: 1.6; font-size: 15px; }

        @media (min-width: 600px) {
            .modal-body { flex-direction: row; }
            .details-poster img { border-bottom-left-radius: 15px; border-top-right-radius: 0; }
        }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 10px; }
            .burger { display: block; }
            header { justify-content: center; flex-direction: column; gap: 20px; margin-top: 10px; padding: 20px; }
            .tabs { position: static; transform: none; width: 100%; justify-content: center; flex-wrap: wrap; }
            .brand { margin-right: 0; font-size: 24px; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
            .card img { height: 210px; }
        }
    </style>
</head>
<body>

    <!-- Сайдбар -->
    <nav class="sidebar" id="sidebar">
        <div class="nav-item active" onclick="setFilter('main', this)">Главная страница</div>
        
        <h3>Подборки</h3>
        <div class="nav-item" onclick="setFilter('top100', this)">⭐ ТОП 100</div>
        <div class="nav-item" onclick="setFilter('new', this)">🔥 Новинки</div>
        
        <h3>Мои списки</h3>
        <div id="dynamicLists"></div>
    </nav>

    <!-- Основной контент -->
    <main class="main-content">
        <header>
            <button class="burger" onclick="toggleSidebar()">☰</button>
            <div class="tabs">
                <div class="tab active" onclick="setCategory('movies', this)">Фильмы</div>
                <div class="tab" onclick="setCategory('series', this)">Сериалы</div>
                <div class="tab" onclick="setCategory('cartoons', this)">Мультфильмы</div>
            </div>
            <div class="brand">Коллекция</div>
        </header>

        <div class="grid" id="contentGrid">
            <p style="text-align: center; grid-column: 1 / -1;">Загрузка данных...</p>
        </div>
    </main>

    <!-- Модальное окно для деталей фильма -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div class="modal-body" id="modalBody">
                <!-- Контент загружается через JS -->
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxw60jw7Wq9702RABq43LwFFvrYIlYoTM2UjjNvk4oXEWqdftdzPRhBb3m4I-ePMzmA/exec';
        
        let allData = [];
        let currentCategory = 'movies'; 
        let currentFilter = 'main'; 

        document.addEventListener('DOMContentLoaded', init);

        async function init() {
            try {
                const res = await fetch(API_URL);
                allData = await res.json();
                generateCustomLists();
                render();
            } catch (error) {
                document.getElementById('contentGrid').innerHTML = '<p style="text-align:center; color:red; grid-column: 1 / -1;">Ошибка загрузки. Проверьте ссылку Apps Script.</p>';
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function setCategory(cat, el) {
            currentCategory = cat;
            currentFilter = 'main'; // Сбрасываем фильтр сайдбара на Главную
            
            // Обновляем активный таб в шапке
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');

            // Возвращаем активный класс пункту "Главная страница" в сайдбаре
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.querySelector('.nav-item[onclick*="main"]').classList.add('active');
            
            render();
        }

        function setFilter(filterType, el) {
            currentFilter = filterType;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            
            if(window.innerWidth <= 768) toggleSidebar(); // Закрываем меню на мобилках
            render();
        }

        function generateCustomLists() {
            const listSet = new Set();
            allData.forEach(item => {
                if(item.customLists) {
                    item.customLists.split(',').forEach(l => {
                        const cleanName = l.trim();
                        if(cleanName) listSet.add(cleanName);
                    });
                }
            });

            const container = document.getElementById('dynamicLists');
            container.innerHTML = Array.from(listSet).map(listName => 
                `<div class="nav-item" onclick="setFilter('${listName}', this)">📌 ${listName}</div>`
            ).join('');
        }

        function render() {
            let filtered = [];

            // Проверяем, где мы находимся
            if (currentFilter === 'main') {
                filtered = allData.filter(i => i.type === currentCategory);
            } else {
                filtered = [...allData];
                
                if (currentFilter === 'top100') {
                    filtered = filtered.filter(i => i.topRank && i.topRank > 0)
                                       .sort((a, b) => a.topRank - b.topRank)
                                       .slice(0, 100);
                } else if (currentFilter === 'new') {
                    const sevenDaysAgo = Date.now() - (7 * 24 * 60 * 60 * 1000);
                    filtered = filtered.filter(i => i.timestamp && i.timestamp >= sevenDaysAgo);
                } else {
                    filtered = filtered.filter(i => i.customLists && i.customLists.includes(currentFilter));
                }
            }

            const grid = document.getElementById('contentGrid');
            if (filtered.length === 0) {
                grid.innerHTML = '<p style="text-align: center; grid-column: 1 / -1; color: #a0a5b5;">Ничего не найдено.</p>';
                return;
            }

            grid.innerHTML = filtered.map(item => {
                const typeName = item.type === 'movies' ? 'Фильм' : item.type === 'series' ? 'Сериал' : 'Мультфильм';
                return `
                <div class="card" onclick="openModal('${item.id}')">
                    <img src="${item.poster}" alt="Постер">
                    <div class="card-info">
                        <div class="card-title">${item.title}</div>
                        <div class="card-meta">${typeName} • ${item.year} • ★ ${item.rating}</div>
                    </div>
                </div>
                `;
            }).join('');
        }

        // Функции модального окна
        function openModal(id) {
            const item = allData.find(i => String(i.id) === String(id));
            if (!item) return;

            const typeName = item.type === 'movies' ? 'Фильм' : item.type === 'series' ? 'Сериал' : 'Мультфильм';
            
            document.getElementById('modalBody').innerHTML = `
                <div class="details-poster">
                    <img src="${item.poster}" alt="Постер">
                </div>
                <div class="details-info">
                    <div class="details-title">${item.title}</div>
                    <div class="details-tags">
                        ${typeName} • ${item.year} • ★ ${item.rating} <br>
                        ${item.genres ? `Жанры: ${item.genres}` : ''}
                    </div>
                    ${item.description ? `
                    <div class="details-section">
                        <h4>Описание:</h4>
                        <p>${item.description}</p>
                    </div>` : ''}
                    ${item.review ? `
                    <div class="details-section">
                        <h4>Мой отзыв:</h4>
                        <p>${item.review}</p>
                    </div>` : ''}
                </div>
            `;
            
            const overlay = document.getElementById('modalOverlay');
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('active'), 10);
            document.body.style.overflow = 'hidden'; 
        }

        function closeModal(event) {
            if (event && event.target.id !== 'modalOverlay' && event.target.className !== 'modal-close') return;
            
            const overlay = document.getElementById('modalOverlay');
            overlay.classList.remove('active');
            setTimeout(() => {
                overlay.style.display = 'none';
                document.body.style.overflow = ''; 
            }, 300);
        }
    </script>
</body>
</html>
